<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Sequence TechStore</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">
            <img src="assets/icons/logo.png" alt="logo">
            <span>Sequence TechStore</span>
        </div>

        <nav>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="products.html"><i class="fas fa-box"></i> Products</a>
            <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a>
            <a href="contact.html" class="active"><i class="fas fa-envelope"></i> Contact</a>
        </nav>
    </header>

    <!-- CONTACT HERO -->
    <section class="contact-hero fade-in">
        <h1>Contact Us</h1>
        <p>We'd love to hear from you. Let's talk.</p>
    </section>

    <!-- CONTACT SECTION -->
    <section class="contact-container container fade-in">

        <!-- FORM -->
        <div class="contact-form">
            <h2>Send a Message</h2>
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea rows="5" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>

        <!-- INFO -->
        <div class="contact-info">
            <h2>Get in Touch</h2>
            <p><i class="fas fa-envelope"></i> support@sequencetech.com</p>
            <p><i class="fas fa-phone"></i> +234 800 000 0000</p>
            <p><i class="fas fa-location-dot"></i> Lagos, Nigeria</p>

            <div class="socials">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
        </div>

    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <h3>Sequence TechStore</h3>
        <p>Your online store for affordable luxury gadgets</p>
        <p>© 2026 Sequence TechStore</p>
    </footer>

</body>

</html>
